<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Users from API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>User Directory</h1>
        
        <div class="controls">
            <button id="fetchUsersBtn" class="btn">Fetch Users</button>
            <button id="reloadBtn" class="btn reload-btn">Reload Data</button>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading users...</p>
        </div>

        <div id="errorMessage" class="error hidden">
            <p>⚠️ An error occurred while fetching data.</p>
        </div>

        <div id="userContainer" class="user-grid">
            <!-- User cards will be displayed here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
