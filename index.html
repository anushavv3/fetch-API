<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h1>
                <i class="fas fa-users"></i> 
                User Directory
            </h1>
            <button id="themeBtn" class="theme-button">
                <i class="fas fa-moon"></i> 
                Dark
            </button>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <i class="fas fa-user-plus"></i>
                <div>
                    <span>Total Users</span>
                    <strong id="userCount">0</strong>
                </div>
            </div>
            <div class="stat-box">
                <i class="fas fa-city"></i>
                <div>
                    <span>Cities</span>
                    <strong id="cityCount">0</strong>
                </div>
            </div>
            <div class="stat-box">
                <i class="fas fa-building"></i>
                <div>
                    <span>Companies</span>
                    <strong id="companyCount">0</strong>
                </div>
            </div>
            <div class="stat-box">
                <i class="fas fa-globe"></i>
                <div>
                    <span>Websites</span>
                    <strong id="websiteCount">0</strong>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="search-group">
                <i class="fas fa-search"></i>
                <input 
                    type="text" 
                    id="searchField" 
                    placeholder="Search by name, email, or city..."
                >
            </div>

            <div class="filter-group">
                <select id="companySelect">
                    <option value="all">All companies</option>
                </select>
                <select id="citySelect">
                    <option value="all">All cities</option>
                </select>
                <select id="sortSelect">
                    <option value="name">Sort by name</option>
                    <option value="email">Sort by email</option>
                </select>
            </div>

            <div class="button-group">
                <button id="fetchBtn" class="btn btn-primary">
                    <i class="fas fa-sync-alt"></i> 
                    Refresh
                </button>
                <button id="exportBtn" class="btn btn-secondary">
                    <i class="fas fa-download"></i> 
                    Save as CSV
                </button>
            </div>
        </div>

        <div id="loadingSpinner" class="spinner-wrap hidden">
            <div class="spinner-circle"></div>
            <p>Loading users...</p>
        </div>

        <div id="errorBox" class="error-message hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <p id="errorMsg">Something went wrong</p>
            <button id="retryBtn" class="btn btn-primary">Try again</button>
        </div>

        <div id="usersList" class="user-cards"></div>

        <div class="pagination-controls" id="paginationBar">
            <button id="prevBtn" disabled>Previous</button>
            <div id="pageNumbers"></div>
            <button id="nextBtn">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
